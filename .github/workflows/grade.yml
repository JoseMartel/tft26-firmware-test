      #   1. Download the bridge binary from a release artifact
      #   2. Run: ./bridge --headless --test tests/<exercise>.json \
      #              --binary ./build/<exercise> --output results.json
      #   3. Parse results.json and post to GitHub Checks API (pass / fail)
      # ---------------------------------------------------------------------------
